name: Sync Upstream v2rayfree

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *'  # UTC 18:00 = 北京时间 02:00

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync upstream to fork
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Git
        run: |
          git config --global user.name "li1410899382-commits"
          git config --global user.email "li1410899382@gmail.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/free-nodes/v2rayfree.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream
        run: git merge upstream/main --allow-unrelated-histories

      - name: Push to origin
        run: |
          git push https://${{ secrets.ACCESS_TOKEN }}@github.com/li1410899382-commits/v2rayfree.git main
