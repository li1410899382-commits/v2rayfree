name: 同步上游节点库
on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时自动同步一次
  workflow_dispatch:     # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 同步上游变更
        run: |
          git remote add upstream https://github.com/free-nodes/v2rayfree.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit

      - name: 推送更新
        run: |
          git push origin main
